<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Nascimento - Realidade Aumentada</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene
    embedded
    vr-mode-ui="enabled: false"
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

    <a-assets>

        <video
            id="videoNascimento"
            src="nascimento.mp4"
            preload="auto"
            loop
            muted
            playsinline
            webkit-playsinline>
        </video>

    </a-assets>

    <a-marker
        type="pattern"
        url="pattern-nascimento.patt">

        <a-video
            src="#videoNascimento"
            position="0 0.5 0"
            rotation="-90 0 0"
            width="3"
            height="3">
        </a-video>

    </a-marker>

    <a-entity camera></a-entity>

</a-scene>

<script>

window.onload = function(){

    const marker = document.querySelector("a-marker");
    const video = document.querySelector("#videoNascimento");

    marker.addEventListener("markerFound", function(){

        video.currentTime = 0;
        video.play();

    });

    marker.addEventListener("markerLost", function(){

        video.pause();
        video.currentTime = 0;

    });

}

</script>

</body>

</html>
